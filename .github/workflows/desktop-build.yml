name: AttendIQ Desktop — Build & Release

on:
  push:
    branches: ["main"]
    tags:
      - "v*.*.*"         # triggers a GitHub Release on e.g. v1.0.0
  pull_request:
    branches: ["main"]
  workflow_dispatch:     # manual trigger from GitHub UI

jobs:
  # ── 1. Build the fat-JAR ────────────────────────────────────────────
  build:
    name: Build Desktop Fat-JAR
    runs-on: windows-latest

    outputs:
      jar_name: ${{ steps.find_jar.outputs.jar_name }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build all modules (skip tests)
        run: mvn clean package -DskipTests

      - name: Find shaded JAR name
        id: find_jar
        shell: pwsh
        run: |
          $jar = Get-ChildItem -Path "desktop/target" -Filter "attendance-desktop-*.jar" |
                 Where-Object { $_.Name -notmatch "^original-" } |
                 Select-Object -First 1
          echo "jar_name=$($jar.Name)" >> $env:GITHUB_OUTPUT
          echo "Found JAR: $($jar.FullName)"

      - name: Upload JAR as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: attendiq-desktop-jar
          retention-days: 30
          path: |
            desktop/target/attendance-desktop-*.jar
            !desktop/target/original-*.jar

  # ── 2. Publish a GitHub Release (only on version tags) ─────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write   # required to create releases and upload assets

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: attendiq-desktop-jar
          path: release-assets/

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AttendIQ Desktop ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          body: |
            ## AttendIQ Desktop ${{ github.ref_name }}

            ### 📥 Installation
            1. Download `attendance-desktop-*.jar` from the Assets section below
            2. Ensure **Java 17** (or later) is installed on your Windows machine
            3. Double-click the JAR, or run: `java -jar attendance-desktop-*.jar`

            ### ⚙️ Configuration
            By default the desktop app connects to `http://localhost:8080`.
            To point at a remote server, set the environment variable or system property:
            ```
            set API_URL=https://your-server.com
            java -jar attendance-desktop-*.jar
            ```
            or
            ```
            java -Dapi.url=https://your-server.com -jar attendance-desktop-*.jar
            ```

            ### 🔑 Who is this for?
            - **Lecturers** — manage courses, start attendance sessions, view QR codes, export CSVs
            - **Students** — can also sign in to view their attendance history

            > The web app for students is available at your institution's deployment URL.
          files: release-assets/*.jar
