services:
  postgres:
    image: postgres:16
    container_name: ucc-attendance-db
    environment:
      POSTGRES_DB: ucc_attendance
      POSTGRES_USER: ucc
      POSTGRES_PASSWORD: ucc_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ucc -d ucc_attendance"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ucc-attendance-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ucc_attendance
      SPRING_DATASOURCE_USERNAME: ucc
      SPRING_DATASOURCE_PASSWORD: ucc_dev
      JWT_SECRET: dev-jwt-secret-change-in-production-min-32-chars
      APP_CORS_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"

volumes:
  pgdata:
