server:
  port: ${PORT:8080}

spring:
  application:
    name: ucc-attendance
  thymeleaf:
    cache: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ucc_attendance}
    username: ${SPRING_DATASOURCE_USERNAME:ucc}
    password: ${SPRING_DATASOURCE_PASSWORD:ucc_dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
  jwt:
    secret: ${JWT_SECRET:dev-jwt-secret-change-in-production-min-32-chars!!}
    expiry-minutes: 480
  qr:
    # Each issued QR remains valid long enough for scan + confirm modal (rotation on desktop is still ~5s).
    ttl-seconds: ${APP_QR_TTL_SECONDS:90}
    confirm-grace-seconds: ${APP_QR_CONFIRM_GRACE_SECONDS:60}
  student-email-pattern: ${STUDENT_EMAIL_PATTERN:.*@.*}
  cors-origins: ${APP_CORS_ORIGINS:http://localhost:8080}

