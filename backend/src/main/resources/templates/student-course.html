<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout :: html_head('Course Details')}"></head>
<body>

<div th:replace="~{layout :: app_nav(~{::#nav-chip})}">
    <span id="nav-chip" class="chip">
        &#x1F393;
        <span th:text="${user.displayName}">Student</span>
    </span>
</div>

<main class="container page-content">
    <div class="mb-3">
        <a href="/student" class="text-sm">&larr; Back to Dashboard</a>
    </div>

    <!-- Course Header -->
    <div class="card mb-4">
        <h1 class="card-title" style="font-size:1.125rem;" th:text="${course.courseCode} + ' — ' + ${course.courseName}">CSC302 — Data Structures</h1>
        <p class="text-xs text-muted" th:text="'Department: ' + ${course.departmentName}">Computer Science</p>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="metric-card">
            <div class="metric-val" th:text="${stats.totalSessions}">0</div>
            <div class="metric-lbl">Total Sessions</div>
        </div>
        <div class="metric-card">
            <div class="metric-val" th:text="${stats.attended}">0</div>
            <div class="metric-lbl">Attended</div>
        </div>
        <div class="metric-card">
            <div class="metric-val" th:text="${stats.missed}">0</div>
            <div class="metric-lbl">Missed</div>
        </div>
        <div class="metric-card">
            <div class="metric-val" th:text="${stats.ratePercent} + '%'">0%</div>
            <div class="metric-lbl">Rate</div>
        </div>
    </div>

    <div class="grid-2">
        <!-- Session History -->
        <div class="card">
            <h2 class="card-title">&#x1F4C5; Session History</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="session : ${sessions}">
                            <td th:text="${#temporals.format(session.createdAt, 'dd MMM yyyy, hh:mm a')}">01 Jan 2025</td>
                            <td>
                                <span th:if="${attendedSessionIds.contains(session.id)}" class="badge badge-present">Present</span>
                                <span th:unless="${attendedSessionIds.contains(session.id)}" class="badge badge-absent">Absent</span>
                            </td>
                        </tr>
                        <tr th:if="${sessions.isEmpty()}">
                            <td colspan="2" class="text-center text-muted text-sm" style="padding:2rem 0;">No sessions yet</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Classmates -->
        <div class="card">
            <h2 class="card-title">&#x1F465; Classmates (<span th:text="${classmates.size()}">0</span>)</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Index</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="mate : ${classmates}">
                            <td th:text="${mate.name}">Student Name</td>
                            <td class="text-muted text-xs" th:text="${mate.indexNumber}">100234</td>
                        </tr>
                        <tr th:if="${classmates.isEmpty()}">
                            <td colspan="2" class="text-center text-muted text-sm" style="padding:2rem 0;">No classmates enrolled</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

</body>
</html>
