<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:fragment="html_head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title th:text="${title} + ' · AttendIQ'">AttendIQ</title>
    <meta name="description" content="Fraud-proof attendance tracking powered by dynamic QR codes.">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Navigation Bar Fragment -->
<nav th:fragment="app_nav(chip)" class="navbar">
    <div class="navbar-inner">
        <a href="/" class="navbar-brand">
            <span class="brand-icon">A</span>
            AttendIQ
        </a>
        
        <div class="navbar-actions">
            <!-- Custom Context Chip -->
            <div th:replace="${chip != null} ? ${chip} : ~{}"></div>

            <!-- Logout Link -->
            <a th:if="${chip != null}" href="/logout" class="btn-logout">
                &#x2192; Logout
            </a>
        </div>
    </div>
</nav>

</body>
</html>
