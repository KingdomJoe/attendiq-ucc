<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout :: html_head('Login')}"></head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <span class="brand-icon" style="width:2.5rem;height:2.5rem;font-size:1.25rem;display:inline-flex;align-items:center;justify-content:center;border-radius:0.75rem;">A</span>
            <h1>AttendIQ</h1>
            <p>Smart Attendance System</p>
        </div>

        <!-- Error message -->
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <!-- Success message -->
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <!-- Tabs -->
        <div class="tabs">
            <a href="/?tab=login" class="tab" th:classappend="${tab == null || tab == 'login'} ? 'active' : ''">Login</a>
            <a href="/?tab=register-student" class="tab" th:classappend="${tab == 'register-student'} ? 'active' : ''">Student Register</a>
            <a href="/?tab=register-lecturer" class="tab" th:classappend="${tab == 'register-lecturer'} ? 'active' : ''">Lecturer Register</a>
        </div>

        <!-- ═══ LOGIN FORM ═══ -->
        <form th:if="${tab == null || tab == 'login'}" action="/login" method="post">
            <div class="form-group">
                <label class="form-label">Role</label>
                <select name="role" class="form-select" required>
                    <option value="STUDENT">Student</option>
                    <option value="LECTURER">Lecturer</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Email / Lecturer Code</label>
                <input type="text" name="identifier" class="form-input" placeholder="Enter email or lecturer code" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <!-- ═══ STUDENT REGISTER FORM ═══ -->
        <form th:if="${tab == 'register-student'}" action="/register/student" method="post">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-input" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" placeholder="your.email@ucc.edu.gh" required>
            </div>
            <div class="form-group">
                <label class="form-label">Index Number</label>
                <input type="text" name="indexNumber" class="form-input" placeholder="e.g. UCC/CS/0001/2023" required>
            </div>
            <div class="form-group">
                <label class="form-label">Department</label>
                <select name="departmentCode" class="form-select" required>
                    <option value="">Select department</option>
                    <option th:each="dept : ${departments}" th:value="${dept.code}" th:text="${dept.name}">Department</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>

        <!-- ═══ LECTURER REGISTER FORM ═══ -->
        <form th:if="${tab == 'register-lecturer'}" action="/register/lecturer" method="post">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-input" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label class="form-label">Lecturer Code</label>
                <input type="text" name="lecturerCode" class="form-input" placeholder="Provided by institution" required>
            </div>
            <div class="form-group">
                <label class="form-label">Department</label>
                <select name="departmentCode" class="form-select" required>
                    <option value="">Select department</option>
                    <option th:each="dept : ${departments}" th:value="${dept.code}" th:text="${dept.name}">Department</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>

        <!-- Lecturer Download Link -->
        <div style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
            <p style="color: var(--text-secondary); margin-bottom: 0.75rem; font-size: 0.9rem;">Lecturers manage sessions via the Windows Desktop App.</p>
            <a href="/lecturer-download" class="btn btn-secondary" style="display: inline-block; padding: 0.5rem 1rem; border: 1px solid var(--border-color); border-radius: 0.375rem; text-decoration: none; color: var(--text-primary);">
                ⬇ Download Desktop App
            </a>
        </div>
    </div>
</div>

</body>
</html>
