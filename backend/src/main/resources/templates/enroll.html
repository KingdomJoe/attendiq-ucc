<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout :: html_head('Course Enrollment')}"></head>
<body>

<main class="login-wrapper">
    <div class="login-card" style="max-width:30rem;">
        <div class="login-header">
            <h1>Join Course</h1>
            <p th:text="${course.courseCode} + ' — ' + ${course.courseName}">CSC301 — Java Programming</p>
            <p class="text-xs text-muted" th:text="'Department: ' + ${course.departmentName}">CSC</p>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{'/enroll/' + ${token}}" method="post">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">Institutional Email</label>
                <input type="email" name="email" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">Index Number</label>
                <input type="text" name="indexNumber" class="form-input" required>
            </div>
            <input type="hidden" name="departmentCode" th:value="${departmentCode}">
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" minlength="8" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Create Account &amp; Enroll</button>
        </form>

        <p class="text-xs text-muted text-center mt-4">
            Already registered?
            <a href="/?tab=login">Sign in</a>, then open this link again to enroll.
        </p>
    </div>
</main>

</body>
</html>
