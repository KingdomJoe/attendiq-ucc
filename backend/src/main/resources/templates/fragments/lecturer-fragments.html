<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Stats Grid Fragment -->
<div th:fragment="stats-grid" class="stats-grid">
    <div class="metric-card">
        <div class="metric-val" th:text="${stats.enrolled}">0</div>
        <div class="metric-lbl">Enrolled Students</div>
    </div>
    <div class="metric-card">
        <div class="metric-val" style="color: var(--color-present-text)" th:text="${stats.present}">0</div>
        <div class="metric-lbl">Present (Live/Last)</div>
    </div>
    <div class="metric-card">
        <div class="metric-val" style="color: var(--color-absent-text)" th:text="${stats.absent}">0</div>
        <div class="metric-lbl">Absent (Live/Last)</div>
    </div>
    <div class="metric-card">
        <div class="metric-val" th:text="${stats.ratePercent} + '%'">0%</div>
        <div class="metric-lbl">Attendance Rate</div>
    </div>
</div>

</html>
